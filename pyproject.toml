[project]
name = "ziniao-mcp"
version = "0.1.14"
description = "紫鸟浏览器 MCP 服务器 - 让 AI Agent 操控紫鸟店铺"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
keywords = ["ziniao", "mcp", "browser", "e-commerce", "cross-border"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Testing",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "requests>=2.28.0",
    "PyYAML>=6.0",
    "mcp>=1.0.0",
    "playwright>=1.40.0",
    "httpx>=0.27.0",
]

[project.scripts]
ziniao-mcp = "ziniao_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ziniao_mcp", "ziniao_webdriver"]

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "python-dotenv>=1.2.2",
]
